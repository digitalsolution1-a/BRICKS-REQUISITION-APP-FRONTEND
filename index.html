<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>BRICKS | Requisition Portal</title>
    
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#003366" />
    <meta name="description" content="BRICKS MURSTEN MATTONI REQUISITION MANAGEMENT SYSTEM" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BRICKS" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    
    <meta name="mobile-web-app-capable" content="yes">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
      body { 
        font-family: 'Inter', sans-serif; 
        margin: 0;
        background-color: #f3f4f6; 
        /* Prevents pull-to-refresh on mobile */
        overscroll-behavior-y: contain; 
        
        /* SAFE AREA INSET: Ensures content is not hidden behind the iPhone notch
           or the status bar when in 'standalone' mode.
        */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      #root {
        min-height: 100vh;
      }
      
      /* Smooth transitions for the app window */
      html {
        scroll-behavior: smooth;
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    
    <script type="module" src="/src/main.jsx"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Registering the service worker as per your sw.js filename
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              console.log('⚓ BRICKS PWA: Service Worker Registered');
              
              // Automatic update handling
              reg.onupdatefound = () => {
                const installingWorker = reg.installing;
                installingWorker.onstatechange = () => {
                  if (installingWorker.state === 'installed') {
                    if (navigator.serviceWorker.controller) {
                      console.log('New content available; please refresh.');
                    } else {
                      console.log('Content is cached for offline use.');
                    }
                  }
                };
              };
            })
            .catch(err => {
              console.error('❌ BRICKS PWA: Registration Failed', err);
            });
        });
      }

      // Logic to prevent links from opening in browser instead of the PWA
      document.addEventListener('click', (e) => {
        if (e.target.tagName === 'A' && e.target.getAttribute('target') !== '_blank') {
          e.preventDefault();
          window.location.href = e.target.href;
        }
      }, false);
    </script>
  </body>
</html>
