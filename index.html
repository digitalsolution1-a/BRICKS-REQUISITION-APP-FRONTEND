<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>BRICKS | Requisition Portal</title>
    
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#003366" />
    <meta name="description" content="BRICKS Maritime Digital Solution for Requisition Management" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BRICKS" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
      body { 
        font-family: 'Inter', sans-serif; 
        margin: 0;
        background-color: #f3f4f6; /* Light gray background */
        /* Prevents "pull-to-refresh" on mobile which can annoy users during data entry */
        overscroll-behavior-y: contain; 
      }
      #root {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    
    <script type="module" src="/src/main.jsx"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Pointing to /sw.js as per your service worker filename
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              console.log('⚓ BRICKS PWA: Service Worker Registered');
            })
            .catch(err => {
              console.error('❌ BRICKS PWA: Registration Failed', err);
            });
        });
      }
    </script>
  </body>
</html>
